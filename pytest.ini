[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: اختبارات الوحدات
    integration: اختبارات التكامل
    e2e: الاختبارات الشاملة (end-to-end)
    slow: اختبارات بطيئة تتطلب API حقيقي
    infrastructure: اختبارات البنية التحتية
asyncio_mode = auto
